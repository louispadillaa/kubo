server:
  port: 8081

spring:
  application:
    name: product-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/kubo}
    username: ${DB_USER:buywise}
    password: ${DB_PASS:buywise123}

  jpa:
    hibernate:
      ddl-aute: validate
    show-sql: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379

  flyway:
    enabled: true
    locations: classpath:db/migration

    graphql:
      graphiql:
        enabled: true             # UI de prueba en /graphiql (solo desarrollo)
      path: /graphql

  eureka:
    client:
      service-url:
        defaultZone: http://${EUREKA_USER:eureka}:${EUREKA_PASS:eureka123}@${EUREKA_HOST:localhost}:8761/eureka/
    instance:
      prefer-ip-address: true
      instance-id: ${spring.application.name}:${server.port}

  # ── URLs servicios Python (NO están en Eureka, son externos) ─────────────
  buywise:
    ml-service:
      url: ${ML_SERVICE_URL:http://localhost:8002}
    scraping-service:
      url: ${SCRAPING_SERVICE_URL:http://localhost:8001}

  # ── Resilience4j ──────────────────────────────────────────────────────────
  resilience4j:
    circuitbreaker:
      instances:
        ml-service:
          sliding-window-size: 10
          failure-rate-threshold: 50
          wait-duration-in-open-state: 30s
          # Si el ML Service falla, retornamos resultados sin IA
    feign:
      circuitbreaker:
        enabled: true
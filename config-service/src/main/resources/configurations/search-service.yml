server:
  port: 9092

spring:
  application:
    name: search-service
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/search
    username:
    password:
    jpa:
      hibernate:
        ddl-auto: create
      database: postgresql
      database-platform: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379

eureka:
  instance:
    hostname: localhost
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka

#kubo:
  #scraping-service:
    #url: ${SCRAPING_SERVICE_URL:http://localhost:8009}

logging:
  level:
    com.kubo: DEBUG
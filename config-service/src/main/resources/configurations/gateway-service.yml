server:
  port: 8080

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
      routes:
        - id: product
          uri: 'http://localhost:8081'
          predicates:
            - Path=/api/products/**
        - id: search
          uri: 'http://localhost:8082'
          predicates:
            - Path=/api/search/**
        - id: purchase
          uri: 'http://localhost:8083'
          predicates:
            - Path=/api/purchase/**

eureka:
  client:
    register-with-eureka: false